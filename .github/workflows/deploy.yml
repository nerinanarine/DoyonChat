name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      skip-tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    if: github.event_name == 'push' || github.event.inputs.skip-tests != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy-infra:
    needs: test
    if: always() && !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      apiAppName: ${{ steps.infra-deploy.outputs.apiAppName }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infrastructure
        id: infra-deploy
        run: |
          API_APP_NAME=$(az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.parameters.json \
            openCodeGoApiKey=${{ secrets.OPENCODE_GO_API_KEY }} \
            cosmosDbKey=${{ secrets.COSMOSDB_KEY }} \
            --query 'properties.outputs.apiAppName.value' \
            -o tsv)
          echo "apiAppName=${API_APP_NAME}" >> $GITHUB_OUTPUT

  deploy-backend:
    needs: deploy-infra
    if: always() && !cancelled() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build Backend
        run: |
          npm ci
          npm run build

      - name: Prepare Deployment Package
        run: |
          npm prune --omit=dev
          zip -r backend-deploy.zip dist package.json node_modules

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ needs.deploy-infra.outputs.apiAppName }}
          package: backend/backend-deploy.zip

      - name: Update App Settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ needs.deploy-infra.outputs.apiAppName }} \
            --settings \
              OPENCODE_GO_API_KEY=${{ secrets.OPENCODE_GO_API_KEY }} \
              COSMOSDB_KEY=${{ secrets.COSMOSDB_KEY }}

  deploy-frontend:
    needs: deploy-infra
    if: always() && !cancelled() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
